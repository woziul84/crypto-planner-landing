<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Message sent — Crypto Planner</title>
  <link rel="stylesheet" href="/styles.css" />

  <style>
    body {
      margin: 0;
      font-family: inherit;
      background: radial-gradient(circle at 20% 30%, rgba(0,200,255,0.12), transparent 40%),
                  radial-gradient(circle at 80% 70%, rgba(0,255,170,0.10), transparent 40%),
                  linear-gradient(180deg, #0c111b 0%, #0f1625 100%);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .thanks-wrapper {
      max-width: 720px;
      width: 90%;
      padding: 60px 40px;
      border-radius: 28px;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.08);
      text-align: center;
      animation: fadeUp 0.8s ease forwards;
      opacity: 0;
      transform: translateY(20px);
    }

    .thanks-icon {
      font-size: 56px;
      margin-bottom: 24px;
      animation: pop 0.6s ease forwards;
    }

    .thanks-title {
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 14px;
    }

    .thanks-text {
      opacity: 0.75;
      margin-bottom: 32px;
      font-size: 16px;
    }

    .thanks-actions {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 22px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 500;
      transition: 0.25s ease;
    }

    .btn-primary {
      background: #00e0ff;
      color: #0c111b;
    }

    .btn-primary:hover {
      background: #00b8d4;
      transform: translateY(-2px);
    }

    .btn-secondary {
      border: 1px solid rgba(255,255,255,0.15);
      color: #ffffff;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.08);
      transform: translateY(-2px);
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pop {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>

<body>

  <div class="thanks-wrapper">

    <div class="thanks-icon">🚀</div>

    <div class="thanks-title">
      Message sent successfully
    </div>

    <div class="thanks-text">
      Thanks for contacting Crypto Planner.  
      We’ll reply within 1–2 business days.
    </div>

    <div class="thanks-actions">
      <a href="/" class="btn btn-primary">Back to homepage</a>
      <a href="/" class="btn btn-secondary">Explore product</a>
    </div>

  </div>

</body>
</html>
