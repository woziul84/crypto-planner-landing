<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Message sent — Crypto Planner</title>
  <link rel="stylesheet" href="/styles.css" />

  <style>
    body {
      margin: 0;
      font-family: inherit;
      background:
        radial-gradient(circle at 20% 20%, rgba(0,150,255,0.15), transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(0,255,200,0.12), transparent 50%),
        linear-gradient(180deg, #f4f7fb 0%, #e9eef6 100%);
      color: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .thanks-wrapper {
      max-width: 720px;
      width: 90%;
      padding: 60px 40px;
      border-radius: 28px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0,0,0,0.05);
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
      text-align: center;
      animation: fadeUp 0.8s ease forwards;
      opacity: 0;
      transform: translateY(20px);
    }

    .thanks-icon {
      font-size: 60px;
      margin-bottom: 24px;
      animation: pulse 2s infinite ease-in-out;
    }

    .thanks-title {
      font-size: 30px;
      font-weight: 600;
      margin-bottom: 14px;
    }

    .thanks-text {
      opacity: 0.7;
      margin-bottom: 32px;
      font-size: 16px;
    }

    .thanks-actions {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 22px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 500;
      transition: 0.25s ease;
    }

    .btn-primary {
      background: #2563eb;
      color: #ffffff;
    }

    .btn-primary:hover {
      background: #1e4fd8;
      transform: translateY(-2px);
    }

    .btn-secondary {
      border: 1px solid rgba(0,0,0,0.1);
      color: #0f172a;
      background: white;
    }

    .btn-secondary:hover {
      background: #f1f5f9;
      transform: translateY(-2px);
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
  </style>
</head>

<body>

  <div class="thanks-wrapper">

    <div class="thanks-icon">✅</div>

    <div class="thanks-title">
      Message sent successfully
    </div>

    <div class="thanks-text">
      Thanks for contacting Crypto Planner.  
      We’ll reply within 1–2 business days.
    </div>

    <div class="thanks-actions">
      <a href="/" class="btn btn-primary">Back to homepage</a>
      <a href="/" class="btn btn-secondary">Explore product</a>
    </div>

  </div>

</body>
</html>
